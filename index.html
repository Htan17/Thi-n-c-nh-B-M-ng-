                    let options = q.o.map((text, idx) => ({ text, isCorrect: idx === correctIndex }));

                                        return (
                                            <div key={i} onClick={()=>{ setViewingUser(p); changeAppState('VIEW_PROFILE'); }} className={`flex justify-between items-center p-3 border cursor-pointer hover:scale-[1.02] transition-transform ${bgRankClass}`}>
                                                <div className="flex items-center gap-3"><span className={`${rankColorClass} text-[16px] font-black w-8 text-center`}>#{i+1}</span><img src={p.photo} className={`w-12 h-12 object-cover ${p.frame ? 'frame-'+p.frame : 'border border-zinc-700'} ${p.aura||''}`} alt="avatar" /><div className="flex flex-col leading-tight"><UserName u={p} cls="text-[13px] tracking-wide" /><span className="text-[9px] text-zinc-500 font-bold mt-1.5 tracking-widest">ID: {p.gameId || '---'}</span>{p.guild && <span className="text-[9px] text-cyan-500 font-black mt-1 tracking-widest">🏯 {p.guild}</span>}</div></div>
                                                <div className="text-right leading-tight">
                                                    {leaderboardTab === 'TOTAL_PASSED' ? <span className="text-pink-500 font-black text-[14px] drop-shadow-[0_0_2px_#ec4899]">🎯 {p.totalPassed || 0}</span> : <span className="text-green-400 font-black text-[14px] drop-shadow-[0_0_2px_#4ade80]">🏆 {p.seasonScore || 0}</span>}
                                                    <div className="text-[10px] streak-fire font-black mt-1.5">🔥 {p.streakCount || 0}</div>
                                                </div>
                                            </div>
                                        )
                                    })}
                                    {leaderboardTab === 'GUILDS' && guildLeaderboardRenderList.map((g, i) => {
                                        let rankColorClass = "text-zinc-500"; let bgRankClass = (g.theme || "bg-black/50 border-zinc-800") + " " + (g.aura || "");
                                        if (i === 0) rankColorClass = "text-yellow-400 drop-shadow-[0_0_2px_#facc15]"; else if (i === 1) rankColorClass = "text-gray-300 drop-shadow-[0_0_2px_#d1d5db]"; else if (i === 2) rankColorClass = "text-orange-400 drop-shadow-[0_0_2px_#fb923c]";
                                        if (g.name === user.guild) bgRankClass += " border-yellow-500 shadow-[inset_0_0_15px_rgba(234,179,8,0.4)]";
                                        const leaderData = allUsers.find(u => u.uid === g.leader || u.name === g.leader) || { name: "Ẩn Danh" };
                                        return (
                                            <div key={i} onClick={() => { playSfx('CLICK'); setViewGuildModal(g); }} className={`flex justify-between items-center p-3 border ${bgRankClass} mb-4 shadow-md cursor-pointer hover:scale-[1.02] transition-transform`}>
                                                <div className="flex items-center gap-3">
                                                    <div className={`w-8 h-8 flex items-center justify-center border ${i === 0 ? 'border-yellow-400 bg-yellow-900/40' : i === 1 ? 'border-gray-300 bg-gray-800/40' : i === 2 ? 'border-orange-400 bg-orange-900/40' : 'border-zinc-700 bg-black/60'}`}><span className={`${rankColorClass} text-[12px] font-black`}>#{i+1}</span></div>
                                                    <GuildBadge guild={g} size="w-14 h-14" />
                                                    <div className="flex flex-col leading-tight justify-center ml-2"><div><span className={`text-[14px] font-black uppercase ${g.frame ? 'frame-'+g.frame : ''} inline-block px-2 py-1 bg-black/40`} style={{ color: g.color || '#eab308' }}>{g.name}</span></div><span className="text-[9px] text-zinc-400 font-bold mt-2 flex items-center gap-1">👑 Bang Chủ: <span className="text-yellow-500 truncate max-w-[80px]"><UserName u={leaderData} /></span></span></div>
                                                </div>
                                                <div className="text-right flex flex-col justify-center border-l border-zinc-700/50 pl-3 min-w-[70px]"><span className="text-cyan-400 font-black text-[13px]">Cấp {g.level}</span><span className="text-[9px] text-zinc-400 font-black mt-1">👥 {g.members?.length || 1}/{g.level*5}</span><span className="text-[8px] text-zinc-500 font-bold mt-0.5">⭐ {g.exp || 0}</span></div>
                                            </div>
                                        )
                                    })}
                                </div>
                                <button onClick={()=>changeAppState('DASHBOARD')} className="p-4 bg-zinc-800 text-zinc-400 text-[11px] font-black uppercase tracking-widest hover:text-white transition-colors">QUAY VỀ BÍ CẢNH</button>
                            </div>
                        )}

                        {appState === 'QUIZ' && activeQuiz.length > 0 && user && (
                            <div className="w-full max-w-md border border-indigo-500/50 p-6 shadow-[0_0_30px_rgba(79,70,229,0.2),inset_0_0_20px_rgba(79,70,229,0.3)] overflow-hidden relative animate-fadeIn rounded-xl" style={{ backgroundImage: 'url(https://i.pinimg.com/originals/ea/4b/c9/ea4bc925bb08de1f744e8f9cb3a5f4f8.gif)', backgroundSize: 'cover', backgroundPosition: 'center' }}>
                                <div className="absolute inset-0 bg-black/85 z-0"></div>
                                <div className="relative z-10">
                                    <div className="flex justify-between items-center mb-6 border-b border-indigo-500/30 pb-3 gap-2">
                                        <span className="text-[11px] font-black text-indigo-300 uppercase truncate flex-1">Ải {curIdx + 1} / {activeQuiz.length}</span>
                                        <span className="text-[11px] font-black text-green-400 uppercase whitespace-nowrap">Đúng: {correctAnswers}</span>
                                        <button onClick={()=>{ if(confirm("Bỏ ải?")){ clearTimeout(quizTimerRef.current); playSfx('FAIL'); setActiveQuiz([]); changeAppState('DASHBOARD'); } }} className="text-red-400 text-lg hover:scale-110 ml-2 p-1 transition-transform">🚪</button>
                                    </div>
                                    <div key={curIdx} className="slide-in-right w-full">
                                        <h3 className="text-[15px] text-white font-bold mb-8 leading-loose min-h-[80px] drop-shadow-[0_0_2px_#000]">{activeQuiz[curIdx].q}</h3>
                                        <div className="space-y-4">
                                            {activeQuiz[curIdx].o.map((optText, optIndex) => {
                                                let btnClasses = "bg-black/60 border border-indigo-500/40 text-indigo-100 hover:border-indigo-400 hover:bg-indigo-900/40 shadow-[0_0_10px_rgba(79,70,229,0.1)] transition-colors";
                                                if (showExplanation) {
                                                    if (optIndex === activeQuiz[curIdx].c) { btnClasses = "bg-green-900/60 border border-green-400 text-green-300 scale-[1.02] shadow-[0_0_15px_rgba(74,222,128,0.4)] font-black"; } 
                                                    else if (optIndex === selectedOption) { btnClasses = "bg-red-900/60 border border-red-500 text-red-300 font-bold"; } 
                                                    else { btnClasses = "bg-black/50 border border-zinc-800 text-zinc-500 opacity-40"; }
                                                }
                                                return (<button key={optIndex} disabled={showExplanation} onClick={() => handleAnswerSelect(optIndex)} className={`w-full text-left p-4 text-sm ${btnClasses}`}><span className="text-[11px] font-black mr-3 opacity-70 uppercase text-indigo-300">{String.fromCharCode(65 + optIndex)}.</span>{optText}</button>);
                                            })}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {appState === 'RESULT' && user && (
                            <div className="w-full max-w-sm h-[90vh] overflow-y-auto custom-scrollbar bg-zinc-900 border-2 border-yellow-500 p-8 text-center shadow-[0_0_30px_rgba(234,179,8,0.3)] animate-fadeIn my-5 pb-10">
                                <h2 className="text-3xl font-black text-yellow-500 font-playfair italic mb-8 drop-shadow-[0_0_8px_rgba(234,179,8,0.5)]">Kết Thúc Lịch Luyện</h2>
                                <div className="text-2xl font-bold mb-8 mt-4"><span className="text-zinc-500 text-[11px] block mb-2 uppercase font-black tracking-widest">Thành Tích</span><span className={correctAnswers > 0 ? 'text-green-500 drop-shadow-[0_0_5px_#22c55e]' : 'text-red-500 drop-shadow-[0_0_5px_#ef4444]'}>{correctAnswers}</span><span className="text-zinc-600"> / {activeQuiz.length}</span></div>
                                <div className="bg-black border border-zinc-800 p-5 mb-8 relative mt-8 shadow-inner">
                                    <div className="absolute -top-3 left-1/2 transform -translate-x-1/2 bg-zinc-900 border border-zinc-800 px-3 py-1 text-[10px] text-yellow-500 font-black uppercase tracking-widest">THU HOẠCH</div>
                                    <div className="flex justify-around items-center pt-3">
                                        <div className="flex flex-col items-center"><span className="text-xl mb-2">💎</span><span className={`text-lg font-black ${stonesGained >= 0 ? 'text-white drop-shadow-[0_0_2px_#fff]' : 'text-red-500'}`}>{stonesGained > 0 ? `+${stonesGained}` : stonesGained}</span></div>
                                        <div className="h-10 w-px bg-zinc-800"></div>
                                        <div className="flex flex-col items-center"><span className="text-xl mb-2">⭐</span><span className={`text-lg font-black ${fameGained >= 0 ? 'text-yellow-500 drop-shadow-[0_0_2px_#eab308]' : 'text-red-500'}`}>{fameGained > 0 ? `+${fameGained}` : fameGained}</span></div>
                                        <div className="h-10 w-px bg-zinc-800"></div>
                                        <div className="flex flex-col items-center"><span className="text-xl mb-2">🏆</span><span className={`text-lg font-black text-green-400 drop-shadow-[0_0_2px_#4ade80]`}>+{correctAnswers}</span></div>
                                    </div>
                                </div>
                                <div className="mt-8 border-t border-yellow-700/30 pt-6 text-left">
                                    <h3 className="text-yellow-500 font-black text-xs mb-4 uppercase tracking-widest text-center">Phong Thần Bảng (TOP 5)</h3>
                                    <div className="space-y-2">
                                        {leaderboardRenderList.filter(x=>leaderboardTab==='ALL').slice(0, 5).map((p, i) => {
                                            let rankCls = "text-zinc-500"; let bgRankCls = "bg-black border-zinc-800";
                                            if (i === 0) { rankCls = "text-yellow-400 drop-shadow-[0_0_2px_#facc15]"; bgRankCls = "bg-yellow-900/20 border-yellow-500"; }
                                            else if (i === 1) { rankCls = "text-gray-300 drop-shadow-[0_0_2px_#d1d5db]"; bgRankCls = "bg-gray-800/30 border-gray-400"; }
                                            else if (i === 2) { rankCls = "text-orange-400 drop-shadow-[0_0_2px_#fb923c]"; bgRankCls = "bg-orange-900/20 border-orange-500"; }
                                            if (p.uid === user.uid) bgRankCls = "bg-yellow-900/40 border-yellow-500";
                                            return (
                                                <div key={i} className={`flex justify-between items-center p-2 border ${bgRankCls}`}>
                                                    <div className="flex items-center gap-2"><span className={`${rankCls} text-xs font-black w-6 text-center`}>#{i+1}</span><img src={p.photo} className={`w-8 h-8 object-cover ${p.frame ? 'frame-'+p.frame : 'border border-zinc-700'} ${p.aura||''}`} /><UserName u={p} cls="text-[11px] tracking-wide" /></div>
                                                    <span className="text-green-400 font-black text-xs whitespace-nowrap">🏆 {p.seasonScore || 0}</span>
                                                </div>
                                            );
                                        })}
                                        {(() => {
                                            const allL = leaderboardRenderList.filter(x=>leaderboardTab==='ALL');
                                            const myIdx = allL.findIndex(p=>p.uid === user.uid);
                                            if (myIdx >= 5) {
                                                const me = allL[myIdx];
                                                return (
                                                    <div className="flex justify-between items-center p-2 border bg-yellow-900/40 border-yellow-500 mt-2 shadow-[0_0_8px_rgba(234,179,8,0.2)]">
                                                        <div className="flex items-center gap-2"><span className="text-zinc-500 text-xs font-black w-6 text-center">#{myIdx+1}</span><img src={me.photo} className={`w-8 h-8 object-cover ${me.frame ? 'frame-'+me.frame : 'border border-zinc-700'} ${me.aura||''}`} /><UserName u={me} cls="text-[11px] tracking-wide" /></div>
                                                        <span className="text-green-400 font-black text-xs whitespace-nowrap drop-shadow-[0_0_2px_#4ade80]">🏆 {(user?.seasonScore || 0)}</span>
                                                    </div>
                                                );
                                            }
                                            return null;
                                        })()}
                                    </div>
                                </div>
                                <button onClick={()=>changeAppState('DASHBOARD')} className="w-full mt-6 bg-zinc-800 text-zinc-400 py-4 font-black uppercase hover:text-white transition-colors text-xs tracking-widest">Trở Về Tàng Kinh Các</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ThienKieuApp />);
    </script>
</body>
</html>
